mutation CreateCategory($input: CreateCategoryInput!) {
  createCategory(createCategoryInput: $input) {
    success
    message
    category {
      id
      name
      iconName
      userId
      createdAt
    }
  }
}

query GetCategories {
  categories {
    id
    name
    iconName
    createdAt
  }
}

query GetExpenses {
  expenses {
    id
    name
    description
    amount
    createdAt
    categoryId
  }
}

mutation CreateExpense($input: CreateExpenseInput!) {
  createExpense(createExpenseInput: $input) {
    success
    message
    expense {
      id
      name
      description
      amount
      createdAt
      categoryId
    }
  }
}

mutation UpdateExpense($input: UpdateExpenseInput!) {
  updateExpense(updateExpenseInput: $input) {
    success
    message
    expense {
      id
      name
      description
      amount
      createdAt
      categoryId
    }
  }
}

mutation RemoveExpense($id: String!) {
  removeExpense(id: $id) {
    success
    message
  }
}
